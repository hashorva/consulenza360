<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consulenza360 Access</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Noto Sans", ui-sans-serif, system-ui, sans-serif;
        background: #f4f1ec;
        color: #1c1917;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(214, 211, 209, 0.8);
        border-radius: 28px;
        background: #fbfaf7;
        box-shadow: 0 1px 2px rgba(28, 25, 23, 0.05), 0 24px 60px rgba(28, 25, 23, 0.1);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 8px 0 24px;
        color: #78716c;
        font-size: 14px;
      }

      .access-identity-providers,
      .access-login-form {
        display: grid;
        gap: 10px;
      }

      a,
      button,
      input[type="submit"] {
        min-height: 40px;
        border-radius: 999px !important;
        border: 1px solid rgba(214, 211, 209, 0.9) !important;
        background: white !important;
        color: #1c1917 !important;
        font: inherit !important;
        font-weight: 600 !important;
        box-shadow: 0 1px 2px rgba(28, 25, 23, 0.06) !important;
      }

      input {
        border-radius: 16px !important;
        border: 1px solid rgba(214, 211, 209, 0.9) !important;
        min-height: 40px;
        padding: 0 12px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Consulenza360</h1>
      <p>Sign in to access EuroTLX ISIN monitoring.</p>
      {{ providers }}
      {{ login_form }}
    </main>
  </body>
</html>
